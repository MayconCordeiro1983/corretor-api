<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadastro | Corretor Pro</title>

<link rel="icon" href="/favicon.ico">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg,#eef3f9,#d1fae5);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card {
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.btn-success {
    background:linear-gradient(135deg,#10b981,#34d399);
    border:none;
}
</style>
</head>
<body>

<div class="card p-4" style="width:420px">
    <h3 class="text-center mb-3">Cadastro</h3>

    <input id="nome" class="form-control mb-2" placeholder="Nome">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

    <button class="btn btn-success w-100" id="btnCadastro">
        Cadastrar
    </button>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast border-0 text-white">
        <div class="d-flex">
            <div id="appToastBody" class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function mostrarToast(msg, tipo="success") {
    const toastEl = document.getElementById("appToast");
    const body = document.getElementById("appToastBody");

    body.innerText = msg;

    toastEl.className = "toast border-0 text-white";

    if(tipo==="success") toastEl.classList.add("bg-success");
    if(tipo==="danger") toastEl.classList.add("bg-danger");
    if(tipo==="warning") toastEl.classList.add("bg-warning","text-dark");

    new bootstrap.Toast(toastEl).show();
}

document.getElementById("btnCadastro").onclick = async () => {

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    if(!nome || !email || !senha){
        mostrarToast("Preencha todos os campos","warning");
        return;
    }

    try{
        const res = await fetch("https://corretor-api-1.onrender.com/usuarios",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({nome,email,senha})
        });

        if(!res.ok){
            mostrarToast("Erro ao cadastrar","danger");
            return;
        }

        mostrarToast("Cadastro realizado com sucesso!");

        setTimeout(()=>{
            window.location="login.html";
        },1000);

    }catch(e){
        mostrarToast("Erro ao conectar","danger");
    }
}
</script>

</body>
</html>
