<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dfe7f3);
            min-height: 100vh;
        }

        .cadastro-card {
            width: 100%;
            max-width: 460px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
        }

        .brand-title {
            font-weight: 700;
            color: #1f2d3d;
        }

        .subtitle {
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card cadastro-card p-4">
    <div class="card-body">
        <h2 class="brand-title text-center mb-2">Criar Conta</h2>
        <p class="subtitle text-center mb-4">Cadastre-se para acessar o sistema</p>

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" placeholder="Digite seu nome">
        </div>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail">
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
        </div>

        <button class="btn btn-success w-100" id="btnCadastro">Cadastrar</button>

        <div id="mensagem" class="alert mt-3 d-none" role="alert"></div>

        <p class="text-center mt-4 mb-0">
            Já tem conta?
            <a href="login.html" class="text-decoration-none">Fazer login</a>
        </p>
    </div>
</div>

<script>
const mensagem = document.getElementById("mensagem");

function mostrarMensagem(texto, tipo = "danger") {
    mensagem.className = `alert alert-${tipo} mt-3`;
    mensagem.classList.remove("d-none");
    mensagem.innerText = texto;
}

document.getElementById("btnCadastro").addEventListener("click", async () => {
    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();

    if (!nome || !email || !senha) {
        mostrarMensagem("Preencha todos os campos.", "warning");
        return;
    }

    try {
        const resposta = await fetch("https://corretor-api-1.onrender.com/usuarios", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nome, email, senha })
        });

        const texto = await resposta.text();

        if (!resposta.ok) {
            mostrarMensagem(texto || "Erro ao cadastrar.", "danger");
            return;
        }

        mostrarMensagem("Cadastro realizado com sucesso!", "success");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);

    } catch (e) {
        console.error(e);
        mostrarMensagem("Erro ao conectar com a API.", "danger");
    }
});
</script>

</body>
</html>
