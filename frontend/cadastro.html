<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Corretor Pro | Cadastro</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="card p-4 shadow" style="width:350px;">
        <h3 class="text-center mb-3">Cadastro</h3>

        <input id="nome" class="form-control mb-2" placeholder="Nome">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

        <button class="btn btn-success w-100" onclick="cadastrar()">Cadastrar</button>
    </div>
</div>

<script>
async function cadastrar() {
    const res = await fetch("https://corretor-api-1.onrender.com/usuarios", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nome: nome.value,
            email: email.value,
            senha: senha.value
        })
    });

    if (!res.ok) {
        alert("Erro ao cadastrar");
        return;
    }

    alert("Cadastro realizado!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
