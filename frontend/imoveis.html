<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>
        Imóveis - Corretor Pro
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef3f8;
        }

        .card-sistema {

            border: none;

            border-radius: 20px;

            box-shadow:
                0 6px 25px rgba(0, 0, 0, .08);

        }

        .badge-status {

            font-size: 13px;

            padding: 8px 12px;

        }

        .btn {

            border-radius: 10px;

            font-weight: 600;

        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a href="dashboard.html" class="navbar-brand fw-bold">

                🏢 Corretor Pro

            </a>

            <div class="d-flex gap-2">

                <a href="dashboard.html" class="btn btn-outline-light">

                    <i class="bi bi-speedometer2"></i>

                    Dashboard

                </a>

                <button id="btnLogout" class="btn btn-danger">

                    <i class="bi bi-box-arrow-right"></i>

                    Sair

                </button>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        <div class="card card-sistema">

            <div class="card-body p-4">

                <h2>

                    <i class="bi bi-house"></i>

                    Cadastro de imóveis

                </h2>

                <hr>

                <div id="mensagem" class="alert d-none">
                </div>

                <div class="row g-3">

                    <div class="col-md-3">

                        <label>Título</label>

                        <input id="titulo" class="form-control">

                    </div>

                    <div class="col-md-3">

                        <label>Endereço</label>

                        <input id="endereco" class="form-control">

                    </div>

                    <div class="col-md-2">

                        <label>Preço</label>

                        <input id="preco" type="number" step="0.01" class="form-control">

                    </div>

                    <div class="col-md-2">

                        <label>Status</label>

                        <select id="status" class="form-select">

                            <option value="DISPONIVEL">

                                Disponível

                            </option>

                            <option value="RESERVADO">

                                Reservado

                            </option>

                            <option value="VENDIDO">

                                Vendido

                            </option>

                            <option value="ALUGADO">

                                Alugado

                            </option>

                        </select>

                    </div>

                    <div class="col-md-2 d-flex align-items-end">

                        <button id="btnSalvar" class="btn btn-primary w-100">

                            <i class="bi bi-plus-circle"></i>

                            Cadastrar

                        </button>

                    </div>

                </div>

                <hr>

                <div class="table-responsive">

                    <table class="table table-hover">

                        <thead>

                            <tr>

                                <th>ID</th>

                                <th>Título</th>

                                <th>Endereço</th>

                                <th>Preço</th>

                                <th>Status</th>

                                <th>Ações</th>

                            </tr>

                        </thead>

                        <tbody id="tabelaImoveis">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <script src="js/api.js"></script>

    <script>

        const API = API_URL;

        const token = obterToken();

        let idEditando = null;

        if (!token) {

            window.location.href = "login.html";

        }

        function mensagem(

            texto,
            tipo = "success"

        ) {

            const alerta =

                document.getElementById(
                    "mensagem"
                );

            alerta.className =

                `alert alert-${tipo}`;

            alerta.innerText =

                texto;

            alerta.classList.remove(
                "d-none"
            );

            setTimeout(() => {

                alerta.classList.add(
                    "d-none"
                );

            }, 3000);

        }

        function badgeStatus(status) {

            if (status === "DISPONIVEL") {

                return `
<span class="badge bg-success">
Disponível
</span>`;

            }

            if (status === "RESERVADO") {

                return `
<span class="badge bg-warning text-dark">
Reservado
</span>`;

            }

            if (status === "VENDIDO") {

                return `
<span class="badge bg-danger">
Vendido
</span>`;

            }

            if (status === "ALUGADO") {

                return `
<span class="badge bg-primary">
Alugado
</span>`;

            }

            return `
<span class="badge bg-secondary">
Sem status
</span>`;

        }

        function limparFormulario() {

            titulo.value = "";

            endereco.value = "";

            preco.value = "";

            status.value = "DISPONIVEL";

            idEditando = null;

            btnSalvar.innerHTML =

                `
<i class="bi bi-plus-circle"></i>
Cadastrar
`;

            btnSalvar.className =

                "btn btn-primary w-100";

        }

        async function carregarImoveis() {

            const resposta =

                await fetch(

                    `${API}/imoveis/meus`,

                    {

                        headers: {

                            Authorization:

                                "Bearer " + token

                        }

                    }

                );

            const dados =

                await resposta.json();

            tabelaImoveis.innerHTML = "";

            dados.forEach(imovel => {

                tabelaImoveis.innerHTML += `

<tr>

<td>

${imovel.id}

</td>

<td>

${imovel.titulo}

</td>

<td>

${imovel.endereco}

</td>

<td>

R$

${Number(
                    imovel.preco
                ).toLocaleString(
                    "pt-BR"
                )}

</td>

<td>

${badgeStatus(
                    imovel.status
                )}

</td>

<td>

<button

onclick=

"editarImovel(

${imovel.id},

'${imovel.titulo}',

'${imovel.endereco}',

${imovel.preco},

'${imovel.status}'

)"

class=

"btn btn-warning btn-sm me-1">

Editar

</button>

<button

onclick=

"deletar(

${imovel.id}

)"

class=

"btn btn-danger btn-sm">

Excluir

</button>

</td>

</tr>

`;

            });

        }

        function editarImovel(

            id,
            tituloValor,
            enderecoValor,
            precoValor,
            statusValor

        ) {

            idEditando = id;

            titulo.value = tituloValor;

            endereco.value = enderecoValor;

            preco.value = precoValor;

            status.value =

                statusValor
                || "DISPONIVEL";

            btnSalvar.innerHTML =

                `
<i class="bi bi-pencil"></i>
Atualizar
`;

            btnSalvar.className =

                "btn btn-warning w-100";

        }

        btnSalvar.addEventListener(

            "click",

            async () => {

                const url =

                    idEditando

                        ?

                        `${API}/imoveis/${idEditando}`

                        :

                        `${API}/imoveis`;

                const metodo =

                    idEditando

                        ?

                        "PUT"

                        :

                        "POST";

                const resposta =

                    await fetch(

                        url,

                        {

                            method: metodo,

                            headers: {

                                "Content-Type":

                                    "application/json",

                                Authorization:

                                    "Bearer " + token

                            },

                            body:

                                JSON.stringify({

                                    titulo:

                                        titulo.value,

                                    endereco:

                                        endereco.value,

                                    preco:

                                        Number(preco.value),

                                    status:

                                        status.value

                                })

                        }

                    );

                if (!resposta.ok) {

                    mensagem(
                        "Erro salvar",
                        "danger"
                    );

                    return;

                }

                mensagem(

                    idEditando

                        ?

                        "Imóvel atualizado"

                        :

                        "Imóvel cadastrado"

                );

                limparFormulario();

                carregarImoveis();

            }

        );

        async function deletar(id) {

            if (

                !confirm(
                    "Deseja excluir?"
                )

            ) {

                return;

            }

            await fetch(

                `${API}/imoveis/${id}`,

                {

                    method: "DELETE",

                    headers: {

                        Authorization:

                            "Bearer " + token

                    }

                }

            );

            mensagem(
                "Excluído"
            );

            carregarImoveis();

        }

        btnLogout.addEventListener(

            "click",

            () => {

                removerToken();

                window.location.href =

                    "login.html";

            }

        );

        carregarImoveis();

    </script>

</body>

</html>
