<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus Imóveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .page-title {
            font-weight: 700;
            color: #1f2d3d;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .table thead th {
            background: #1f2d3d;
            color: white;
            border: none;
        }

        .table tbody tr:hover {
            background: #f8fafc;
        }

        .btn-action {
            min-width: 84px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="top-bar mb-4">
        <h1 class="page-title mb-0">Meus Imóveis</h1>
        <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">Voltar</button>
    </div>

    <div class="card mb-4">
        <div class="card-body p-4">
            <h3 class="mb-4">Cadastrar novo imóvel</h3>

            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="titulo" class="form-control" placeholder="Título">
                </div>
                <div class="col-md-4">
                    <input type="text" id="endereco" class="form-control" placeholder="Endereço">
                </div>
                <div class="col-md-4">
                    <input type="number" id="preco" class="form-control" placeholder="Preço">
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mt-4">
                <button class="btn btn-primary" id="btnSalvar">Salvar</button>
                <button class="btn btn-success" id="btnCarregar">Carregar imóveis</button>
                <button class="btn btn-outline-secondary d-none" id="btnCancelarEdicao">Cancelar edição</button>
            </div>

            <div class="alert mt-4 d-none" id="mensagem" role="alert"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Lista de imóveis</h3>
                <span class="badge text-bg-dark" id="contador">0 imóveis</span>
            </div>

            <div class="table-responsive">
                <table class="table align-middle table-hover mb-0" id="tabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Endereço</th>
                            <th>Preço</th>
                            <th style="width: 220px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="text-center text-muted py-4 d-none" id="vazio">
                Nenhum imóvel encontrado.
            </div>
        </div>
    </div>
</div>

<script>
let idEditando = null;

const token = localStorage.getItem("token");

if (!token) {
    alert("Você precisa fazer login.");
    window.location.href = "login.html";
}

const mensagem = document.getElementById("mensagem");
const btnSalvar = document.getElementById("btnSalvar");
const btnCarregar = document.getElementById("btnCarregar");
const btnCancelarEdicao = document.getElementById("btnCancelarEdicao");
const contador = document.getElementById("contador");
const vazio = document.getElementById("vazio");

function mostrarMensagem(texto, tipo = "success") {
    mensagem.className = `alert alert-${tipo} mt-4`;
    mensagem.classList.remove("d-none");
    mensagem.innerText = texto;
}

function esconderMensagem() {
    mensagem.classList.add("d-none");
}

function resetForm() {
    idEditando = null;
    document.getElementById("titulo").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("preco").value = "";
    btnSalvar.innerText = "Salvar";
    btnCancelarEdicao.classList.add("d-none");
}

function editarImovel(id, titulo, endereco, preco) {
    document.getElementById("titulo").value = titulo;
    document.getElementById("endereco").value = endereco;
    document.getElementById("preco").value = preco;

    idEditando = id;
    btnSalvar.innerText = "Atualizar";
    btnCancelarEdicao.classList.remove("d-none");

    mostrarMensagem("Editando imóvel ID: " + id, "warning");
    window.scrollTo({ top: 0, behavior: "smooth" });
}

btnCancelarEdicao.addEventListener("click", () => {
    resetForm();
    mostrarMensagem("Edição cancelada.", "secondary");
});

btnSalvar.addEventListener("click", async () => {
    esconderMensagem();

    const titulo = document.getElementById("titulo").value.trim();
    const endereco = document.getElementById("endereco").value.trim();
    const preco = document.getElementById("preco").value;

    if (!titulo || !endereco || !preco) {
        mostrarMensagem("Preencha todos os campos.", "danger");
        return;
    }

    try {
        const url = idEditando
            ? `http://localhost:8081/imoveis/${idEditando}`
            : "http://localhost:8081/imoveis";

        const metodo = idEditando ? "PUT" : "POST";

        const resposta = await fetch(url, {
            method: metodo,
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ titulo, endereco, preco })
        });

        const texto = await resposta.text();

        if (!resposta.ok) {
            mostrarMensagem("Erro: " + texto, "danger");
            return;
        }

        mostrarMensagem(idEditando ? "Imóvel atualizado com sucesso!" : "Imóvel cadastrado com sucesso!", "success");
        resetForm();
        btnCarregar.click();

    } catch (e) {
        console.error(e);
        mostrarMensagem("Erro ao salvar imóvel.", "danger");
    }
});

btnCarregar.addEventListener("click", async () => {
    esconderMensagem();

    try {
        const resposta = await fetch("http://localhost:8081/imoveis/meus", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (!resposta.ok) {
            const texto = await resposta.text();
            mostrarMensagem("Erro: " + texto, "danger");
            return;
        }

        const dados = await resposta.json();
        const tbody = document.querySelector("#tabela tbody");
        tbody.innerHTML = "";

        contador.innerText = `${dados.length} imóvel(is)`;
        vazio.classList.toggle("d-none", dados.length !== 0);

        dados.forEach(imovel => {
            const tituloSeguro = String(imovel.titulo).replace(/'/g, "\\'");
            const enderecoSeguro = String(imovel.endereco).replace(/'/g, "\\'");

            const linha = `
                <tr>
                    <td>${imovel.id}</td>
                    <td>${imovel.titulo}</td>
                    <td>${imovel.endereco}</td>
                    <td>R$ ${Number(imovel.preco).toLocaleString("pt-BR")}</td>
                    <td>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-primary btn-sm btn-action"
                                onclick="editarImovel(${imovel.id}, '${tituloSeguro}', '${enderecoSeguro}', ${imovel.preco})">
                                Editar
                            </button>
                            <button class="btn btn-danger btn-sm btn-action"
                                onclick="excluirImovel(${imovel.id})">
                                Excluir
                            </button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.innerHTML += linha;
        });

    } catch (e) {
        console.error(e);
        mostrarMensagem("Erro ao carregar imóveis.", "danger");
    }
});

async function excluirImovel(id) {
    const confirmar = confirm("Deseja excluir este imóvel?");
    if (!confirmar) return;

    try {
        const resposta = await fetch(`http://localhost:8081/imoveis/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const texto = await resposta.text();

        if (!resposta.ok) {
            mostrarMensagem("Erro: " + texto, "danger");
            return;
        }

        mostrarMensagem("Imóvel excluído com sucesso!", "success");
        btnCarregar.click();

    } catch (e) {
        console.error(e);
        mostrarMensagem("Erro ao excluir imóvel.", "danger");
    }
}
</script>
</body>
</html>
