<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Corretor Pro | Imóveis</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">Corretor Pro</span>
        <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
    </div>
</nav>

<div class="container mt-4">

    <h3>Meus Imóveis</h3>

    <input id="titulo" class="form-control mb-2" placeholder="Título">
    <input id="endereco" class="form-control mb-2" placeholder="Endereço">
    <input id="preco" type="number" class="form-control mb-3" placeholder="Preço">

    <button class="btn btn-primary mb-3" onclick="salvar()">Salvar</button>

    <ul id="lista" class="list-group"></ul>

</div>

<footer class="text-center mt-5 text-muted">
    © 2026 Corretor Pro
</footer>

<script>
if (!localStorage.getItem("token")) {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

async function salvar() {
    const token = localStorage.getItem("token");

    await fetch("https://corretor-api-1.onrender.com/imoveis", {
        method: "POST",
        headers: {
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },
        body: JSON.stringify({
            titulo: titulo.value,
            endereco: endereco.value,
            preco: Number(preco.value)
        })
    });

    carregar();
}

async function carregar() {
    const token = localStorage.getItem("token");

    const res = await fetch("https://corretor-api-1.onrender.com/imoveis/meus", {
        headers: {"Authorization":"Bearer " + token}
    });

    const data = await res.json();

    lista.innerHTML = "";

    data.forEach(i => {
        lista.innerHTML += `<li class="list-group-item">
            ${i.titulo} - R$ ${i.preco}
        </li>`;
    });
}

carregar();
</script>

</body>
</html>
