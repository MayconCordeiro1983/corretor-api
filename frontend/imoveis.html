<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carteira de Imóveis - Corretor Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f3f6fb;
            --dark: #17202a;
            --primary: #3056d3;
            --soft: #eef2ff;
            --border: #dfe6f0;
            --muted: #6b7280;
            --success: #15803d;
            --warning: #ca8a04;
            --danger: #dc2626;
        }

        body {
            background: var(--bg);
            color: #111827;
            min-height: 100vh;
        }

        .topbar {
            background: #111827;
            padding: 14px 0;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .12);
        }

        .brand {
            color: white;
            text-decoration: none;
            font-weight: 800;
            letter-spacing: -.3px;
        }

        .page-shell {
            max-width: 1240px;
            margin: 0 auto;
        }

        .hero {
            background: linear-gradient(135deg, #18253f, #304c89);
            color: white;
            border-radius: 28px;
            padding: 34px;
            box-shadow: 0 18px 42px rgba(31, 41, 55, .18);
        }

        .hero h1 {
            font-weight: 900;
            letter-spacing: -.8px;
        }

        .hero p {
            color: #dbeafe;
            margin: 0;
        }

        .panel {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, .06);
        }

        .panel-title {
            font-weight: 800;
            letter-spacing: -.3px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 11px 13px;
            border-color: #d9e2ef;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 .20rem rgba(48, 86, 211, .15);
            border-color: var(--primary);
        }

        .btn {
            border-radius: 14px;
            font-weight: 700;
            padding: 10px 15px;
        }

        .summary-pill {
            background: white;
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px 18px;
            height: 100%;
        }

        .summary-pill small {
            color: var(--muted);
            font-weight: 700;
        }

        .summary-pill strong {
            font-size: 26px;
        }

        .property-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 26px rgba(15, 23, 42, .06);
            transition: .2s ease;
            height: 100%;
        }

        .property-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(15, 23, 42, .10);
        }

        .property-img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            background: #e5e7eb;
        }

        .empty-photo {
            height: 190px;
            background: linear-gradient(135deg, #e5e7eb, #f8fafc);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-weight: 700;
        }

        .property-body {
            padding: 20px;
        }

        .property-title {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: -.3px;
            margin-bottom: 6px;
        }

        .property-location {
            color: var(--muted);
            font-size: 14px;
            min-height: 44px;
        }

        .property-price {
            font-size: 22px;
            font-weight: 900;
            margin-top: 12px;
            color: #0f172a;
        }

        .status-badge {
            border-radius: 999px;
            padding: 8px 13px;
            font-size: 12px;
            font-weight: 800;
        }

        .status-disponivel {
            background: #dcfce7;
            color: #166534;
        }

        .status-reservado {
            background: #fef3c7;
            color: #92400e;
        }

        .status-vendido {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-alugado {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .filter-box {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 18px;
        }

        .small-label {
            font-size: 13px;
            font-weight: 800;
            color: #374151;
            margin-bottom: 6px;
        }

        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .map-link {
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <nav class="topbar">
        <div class="container page-shell d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="brand">
                🏢 Corretor Pro
            </a>

            <div class="d-flex gap-2">
                <a href="dashboard.html" class="btn btn-outline-light">
                    <i class="bi bi-speedometer2"></i> Painel
                </a>

                <button id="btnLogout" class="btn btn-danger">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <main class="container page-shell py-5">

        <section class="hero mb-4">
            <div class="row align-items-center g-4">
                <div class="col-md-8">
                    <h1>Carteira de Imóveis</h1>
                    <p>
                        Cadastre, organize e acompanhe seus imóveis com status, localização, imagem e mapa.
                    </p>
                </div>

                <div class="col-md-4">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="summary-pill text-dark">
                                <small>Total</small><br>
                                <strong id="resumoTotal">0</strong>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="summary-pill text-dark">
                                <small>Exibidos</small><br>
                                <strong id="resumoExibidos">0</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="mensagem" class="alert d-none"></div>

        <section class="panel p-4 mb-4">
            <h4 class="panel-title mb-3">
                <i class="bi bi-pencil-square"></i>
                Dados do imóvel
            </h4>

            <div class="row g-3">
                <div class="col-md-3">
                    <div class="small-label">Título</div>
                    <input id="titulo" class="form-control" placeholder="Ex: Casa Jardins">
                </div>

                <div class="col-md-3">
                    <div class="small-label">Endereço</div>
                    <input id="endereco" class="form-control" placeholder="Rua, avenida ou condomínio">
                </div>

                <div class="col-md-2">
                    <div class="small-label">Preço</div>
                    <input id="preco" type="number" step="0.01" class="form-control" placeholder="850000">
                </div>

                <div class="col-md-2">
                    <div class="small-label">Status</div>
                    <select id="status" class="form-select">
                        <option value="DISPONIVEL">Disponível</option>
                        <option value="RESERVADO">Reservado</option>
                        <option value="VENDIDO">Vendido</option>
                        <option value="ALUGADO">Alugado</option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button id="btnSalvar" class="btn btn-primary w-100">
                        <i class="bi bi-plus-circle"></i> Salvar
                    </button>
                </div>

                <div class="col-md-3">
                    <div class="small-label">Bairro</div>
                    <input id="bairro" class="form-control" placeholder="Setor Bueno">
                </div>

                <div class="col-md-3">
                    <div class="small-label">Cidade</div>
                    <input id="cidade" class="form-control" placeholder="Goiânia">
                </div>

                <div class="col-md-2">
                    <div class="small-label">Estado</div>
                    <input id="estado" class="form-control" maxlength="2" placeholder="GO">
                </div>

                <div class="col-md-2">
                    <div class="small-label">CEP</div>
                    <input id="cep" class="form-control" placeholder="74000-000">
                </div>

                <div class="col-md-2">
                    <div class="small-label">Mapa</div>
                    <input id="mapaUrl" class="form-control" placeholder="Google Maps">
                </div>

                <div class="col-md-12">
                    <div class="small-label">Imagem do imóvel</div>
                    <input id="imagemUrl" class="form-control" placeholder="https://site.com/imagem.jpg">
                </div>
            </div>
        </section>

        <section class="filter-box mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <div class="small-label">
                        <i class="bi bi-search"></i>
                        Buscar na carteira
                    </div>
                    <input id="filtroTexto" class="form-control"
                        placeholder="Título, endereço, bairro, cidade, estado ou CEP">
                </div>

                <div class="col-md-3">
                    <div class="small-label">Status</div>
                    <select id="filtroStatus" class="form-select">
                        <option value="">Todos</option>
                        <option value="DISPONIVEL">Disponível</option>
                        <option value="RESERVADO">Reservado</option>
                        <option value="VENDIDO">Vendido</option>
                        <option value="ALUGADO">Alugado</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <div class="small-label">Ordenar</div>
                    <select id="ordenacao" class="form-select">
                        <option value="">Padrão</option>
                        <option value="az">Nome A-Z</option>
                        <option value="precoMenor">Menor preço</option>
                        <option value="precoMaior">Maior preço</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <button id="btnLimparFiltros" class="btn btn-outline-secondary w-100">
                        Limpar filtros
                    </button>
                </div>
            </div>
        </section>

        <section>
            <div id="listaCards" class="row g-4"></div>
        </section>

    </main>

    <script src="js/api.js"></script>

    <script>
        const API = API_URL;
        const token = obterToken();

        let idEditando = null;
        let listaImoveis = [];

        if (!token) {
            window.location.href = "login.html";
        }

        function mensagem(texto, tipo = "success") {
            const alerta = document.getElementById("mensagem");
            alerta.className = `alert alert-${tipo}`;
            alerta.innerText = texto;
            alerta.classList.remove("d-none");

            setTimeout(() => {
                alerta.classList.add("d-none");
            }, 3000);
        }

        function textoStatus(status) {
            if (status === "DISPONIVEL") return "Disponível";
            if (status === "RESERVADO") return "Reservado";
            if (status === "VENDIDO") return "Vendido";
            if (status === "ALUGADO") return "Alugado";
            return "Sem status";
        }

        function classeStatus(status) {
            if (status === "DISPONIVEL") return "status-disponivel";
            if (status === "RESERVADO") return "status-reservado";
            if (status === "VENDIDO") return "status-vendido";
            if (status === "ALUGADO") return "status-alugado";
            return "status-disponivel";
        }

        function moeda(valor) {
            return Number(valor || 0).toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
            });
        }

        function imagemCard(imagemUrl) {
            if (imagemUrl && imagemUrl.trim() !== "") {
                return `
                <a href="${imagemUrl}" target="_blank">
                    <img
                        src="${imagemUrl}"
                        class="property-img"
                        alt="Imagem do imóvel"
                        onerror="this.outerHTML='<div class=&quot;empty-photo&quot;>Imagem indisponível</div>'">
                </a>
            `;
            }

            return `<div class="empty-photo">Sem imagem cadastrada</div>`;
        }

        function mapaLink(mapaUrl) {
            if (mapaUrl && mapaUrl.trim() !== "") {
                return `
                <a href="${mapaUrl}" target="_blank" class="map-link">
                    <i class="bi bi-geo-alt-fill"></i> Abrir localização
                </a>
            `;
            }

            return `<span class="text-muted small">Mapa não informado</span>`;
        }

        function descricaoLocal(imovel) {
            const partes = [];

            if (imovel.bairro) partes.push(imovel.bairro);

            const cidadeEstado =
                `${imovel.cidade || ""}${imovel.estado ? " - " + imovel.estado : ""}`.trim();

            if (cidadeEstado) partes.push(cidadeEstado);

            if (imovel.cep) partes.push("CEP " + imovel.cep);

            return partes.length > 0 ? partes.join(" • ") : "Localização não detalhada";
        }

        function limparFormulario() {
            titulo.value = "";
            endereco.value = "";
            preco.value = "";
            document.getElementById("status").value = "DISPONIVEL";
            bairro.value = "";
            cidade.value = "";
            estado.value = "";
            cep.value = "";
            mapaUrl.value = "";
            imagemUrl.value = "";

            idEditando = null;

            btnSalvar.innerHTML = `<i class="bi bi-plus-circle"></i> Salvar`;
            btnSalvar.className = "btn btn-primary w-100";
        }

        function aplicarFiltros() {
            const texto = filtroTexto.value.trim().toLowerCase();
            const statusSelecionado = filtroStatus.value;
            const ordem = ordenacao.value;

            let resultado = [...listaImoveis];

            if (texto) {
                resultado = resultado.filter(imovel => {
                    const campos = [
                        imovel.titulo,
                        imovel.endereco,
                        imovel.bairro,
                        imovel.cidade,
                        imovel.estado,
                        imovel.cep
                    ].join(" ").toLowerCase();

                    return campos.includes(texto);
                });
            }

            if (statusSelecionado) {
                resultado = resultado.filter(imovel => imovel.status === statusSelecionado);
            }

            if (ordem === "az") {
                resultado.sort((a, b) =>
                    (a.titulo || "").localeCompare(b.titulo || "", "pt-BR")
                );
            }

            if (ordem === "precoMenor") {
                resultado.sort((a, b) => Number(a.preco || 0) - Number(b.preco || 0));
            }

            if (ordem === "precoMaior") {
                resultado.sort((a, b) => Number(b.preco || 0) - Number(a.preco || 0));
            }

            renderizarCards(resultado);
        }

        function renderizarCards(dados) {
            listaCards.innerHTML = "";

            resumoTotal.innerText = listaImoveis.length;
            resumoExibidos.innerText = dados.length;

            if (dados.length === 0) {
                listaCards.innerHTML = `
                <div class="col-12">
                    <div class="panel p-5 text-center">
                        <h5>Nenhum imóvel encontrado</h5>
                        <p class="text-muted mb-0">
                            Ajuste os filtros ou cadastre um novo imóvel.
                        </p>
                    </div>
                </div>
            `;
                return;
            }

            dados.forEach(imovel => {
                listaCards.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <article class="property-card">
                        ${imagemCard(imovel.imagemUrl)}

                        <div class="property-body">
                            <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                                <div>
                                    <div class="property-title">
                                        ${imovel.titulo || "Imóvel sem título"}
                                    </div>

                                    <div class="property-location">
                                        <i class="bi bi-pin-map"></i>
                                        ${descricaoLocal(imovel)}
                                    </div>
                                </div>

                                <span class="status-badge ${classeStatus(imovel.status)}">
                                    ${textoStatus(imovel.status)}
                                </span>
                            </div>

                            <div class="mt-3">
                                <strong>Endereço:</strong><br>
                                <span class="text-muted">${imovel.endereco || "---"}</span>
                            </div>

                            <div class="property-price">
                                ${moeda(imovel.preco)}
                            </div>

                            <div class="mt-2">
                                ${mapaLink(imovel.mapaUrl)}
                            </div>

                            <div class="action-row">
                                <button
                                    onclick='editarImovel(${JSON.stringify(imovel)})'
                                    class="btn btn-warning btn-sm">
                                    <i class="bi bi-pencil"></i> Editar
                                </button>

                                <button
                                    onclick="deletar(${imovel.id})"
                                    class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i> Excluir
                                </button>
                            </div>
                        </div>
                    </article>
                </div>
            `;
            });
        }

        async function carregarImoveis() {
            try {
                const resposta = await fetch(`${API}/imoveis/meus`, {
                    headers: {
                        Authorization: "Bearer " + token
                    }
                });

                if (resposta.status === 401 || resposta.status === 403) {
                    removerToken();
                    window.location.href = "login.html";
                    return;
                }

                listaImoveis = await resposta.json();
                aplicarFiltros();

            } catch (erro) {
                console.error(erro);
                mensagem("Erro ao carregar imóveis", "danger");
            }
        }

        function editarImovel(imovel) {
            idEditando = imovel.id;

            titulo.value = imovel.titulo || "";
            endereco.value = imovel.endereco || "";
            preco.value = imovel.preco || "";
            document.getElementById("status").value = imovel.status || "DISPONIVEL";

            bairro.value = imovel.bairro || "";
            cidade.value = imovel.cidade || "";
            estado.value = imovel.estado || "";
            cep.value = imovel.cep || "";
            mapaUrl.value = imovel.mapaUrl || "";
            imagemUrl.value = imovel.imagemUrl || "";

            btnSalvar.innerHTML = `<i class="bi bi-pencil"></i> Atualizar`;
            btnSalvar.className = "btn btn-warning w-100";

            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        btnSalvar.addEventListener("click", async () => {
            const url = idEditando
                ? `${API}/imoveis/${idEditando}`
                : `${API}/imoveis`;

            const metodo = idEditando ? "PUT" : "POST";

            try {
                const resposta = await fetch(url, {
                    method: metodo,
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Bearer " + token
                    },
                    body: JSON.stringify({
                        titulo: titulo.value,
                        endereco: endereco.value,
                        preco: Number(preco.value),
                        bairro: bairro.value,
                        cidade: cidade.value,
                        estado: estado.value,
                        cep: cep.value,
                        mapaUrl: mapaUrl.value,
                        status: document.getElementById("status").value,
                        imagemUrl: imagemUrl.value.trim()
                    })
                });

                if (!resposta.ok) {
                    mensagem("Não foi possível salvar o imóvel.", "danger");
                    return;
                }

                mensagem(idEditando ? "Imóvel atualizado com sucesso." : "Imóvel cadastrado com sucesso.");

                limparFormulario();
                await carregarImoveis();

            } catch (erro) {
                console.error(erro);
                mensagem("Erro ao salvar imóvel", "danger");
            }
        });

        async function deletar(id) {
            if (!confirm("Deseja excluir este imóvel da carteira?")) {
                return;
            }

            try {
                const resposta = await fetch(`${API}/imoveis/${id}`, {
                    method: "DELETE",
                    headers: {
                        Authorization: "Bearer " + token
                    }
                });

                if (!resposta.ok) {
                    mensagem("Erro ao excluir imóvel", "danger");
                    return;
                }

                mensagem("Imóvel removido da carteira.");
                await carregarImoveis();

            } catch (erro) {
                console.error(erro);
                mensagem("Erro ao excluir imóvel", "danger");
            }
        }

        filtroTexto.addEventListener("input", aplicarFiltros);
        filtroStatus.addEventListener("change", aplicarFiltros);
        ordenacao.addEventListener("change", aplicarFiltros);

        btnLimparFiltros.addEventListener("click", () => {
            filtroTexto.value = "";
            filtroStatus.value = "";
            ordenacao.value = "";
            aplicarFiltros();
        });

        btnLogout.addEventListener("click", () => {
            removerToken();
            window.location.href = "login.html";
        });

        carregarImoveis();
    </script>

</body>

</html>
