<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dashboard - Corretor Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {

            background: #eef3f8;
            min-height: 100vh;

        }

        .navbar {

            box-shadow: 0 4px 15px rgba(0, 0, 0, .10);

        }

        .dashboard-card {

            border: none;
            border-radius: 22px;

            box-shadow:

                0 6px 28px rgba(0, 0, 0, .08);

            overflow: hidden;

        }

        .dashboard-header {

            background:

                linear-gradient(135deg,
                    #4f46e5,
                    #6366f1);

            color: white;

            padding: 28px;

        }

        .info-card {

            background: white;

            padding: 22px;

            border-radius: 18px;

            box-shadow:

                0 4px 18px rgba(0, 0, 0, .06);

            height: 100%;

        }

        .total {

            font-size: 42px;

            font-weight: 900;

            color: #4f46e5;

        }

        .relatorio-box {

            background: #f8fafc;

            padding: 25px;

            border-radius: 20px;

            border:

                1px solid #e5e7eb;

        }

        .btn {

            border-radius: 12px;

            font-weight: 700;

        }

        .form-control,
        .form-select {

            border-radius: 12px;

            padding: 12px;

        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <span class="navbar-brand fw-bold">

                🏢 Corretor Pro

            </span>

            <button id="btnLogout" type="button" class="btn btn-danger">

                <i class="bi bi-box-arrow-right">

                </i>

                Sair

            </button>

        </div>

    </nav>


    <div class="container py-5">

        <div class="card dashboard-card">

            <div class="dashboard-header">

                <h2>

                    <i class="bi bi-speedometer2">

                    </i>

                    Dashboard

                </h2>

                <p>

                    Painel principal

                </p>

            </div>

            <div class="card-body p-4">

                <div id="mensagem" class="alert d-none">

                </div>


                <div class="row g-4">

                    <div class="col-md-4">

                        <div class="info-card">

                            <h6>

                                Usuário

                            </h6>

                            <h4 id="nomeUsuario">

                                ---

                            </h4>

                        </div>

                    </div>


                    <div class="col-md-4">

                        <div class="info-card">

                            <h6>

                                Email

                            </h6>

                            <h5 id="emailUsuario">

                                ---

                            </h5>

                        </div>

                    </div>


                    <div class="col-md-4">

                        <div class="info-card">

                            <h6>

                                Total imóveis

                            </h6>

                            <div id="totalImoveis" class="total">

                                0

                            </div>

                        </div>

                    </div>

                </div>


                <hr class="my-4">


                <div class="d-flex flex-wrap gap-3">

                    <a href="imoveis.html" class="btn btn-primary btn-lg">

                        <i class="bi bi-house">

                        </i>

                        Gerenciar imóveis

                    </a>


                    <button id="btnAtualizar" class="btn btn-success btn-lg">

                        Atualizar

                    </button>

                </div>


                <div class="relatorio-box mt-4">

                    <h4>

                        📄 Relatórios

                    </h4>

                    <p>

                        Gerar PDF
                        dos imóveis

                    </p>

                    <div class="row g-3">

                        <div class="col-md-5">

                            <input id="filtroTitulo" class="form-control" placeholder="Filtrar título">

                        </div>


                        <div class="col-md-3">

                            <select id="ordenacao" class="form-select">

                                <option value="titulo">

                                    Ordem alfabética

                                </option>

                                <option value="preco">

                                    Preço

                                </option>

                            </select>

                        </div>


                        <div class="col-md-4">

                            <button id="btnPdf" class="btn btn-danger w-100">

                                Gerar PDF

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <script src="js/api.js"></script>

    <script>

        const API = API_URL;

        const token =

            obterToken();

        if (!token) {

            window.location.href =

                "login.html";

        }


        function mensagem(

            texto,
            tipo = "success"

        ) {

            const alerta =

                document
                    .getElementById(
                        "mensagem"
                    );

            alerta.className =

                `alert alert-${tipo}`;

            alerta.innerText =

                texto;

            alerta.classList
                .remove(
                    "d-none"
                );

            setTimeout(() => {

                alerta.classList
                    .add(
                        "d-none"
                    );

            }, 3000);

        }


        async function carregarPerfil() {

            try {

                const resposta =

                    await fetch(

                        `${API}/usuarios/me`,

                        {

                            headers: {

                                Authorization:

                                    "Bearer " + token

                            }

                        }

                    );

                if (!resposta.ok) {

                    throw new Error();

                }

                const usuario =

                    await resposta.json();

                document
                    .getElementById(
                        "nomeUsuario"
                    )

                    .innerText =

                    usuario.nome;

                document
                    .getElementById(
                        "emailUsuario"
                    )

                    .innerText =

                    usuario.email;

            } catch {

                mensagem(
                    "Erro perfil",
                    "danger"
                );

            }

        }


        async function carregarImoveis() {

            try {

                const resposta =

                    await fetch(

                        `${API}/imoveis/meus`,

                        {

                            headers: {

                                Authorization:

                                    "Bearer " + token

                            }

                        }

                    );

                const dados =

                    await resposta.json();

                document
                    .getElementById(
                        "totalImoveis"
                    )

                    .innerText =

                    dados.length;

            } catch {

                mensagem(
                    "Erro imóveis",
                    "danger"
                );

            }

        }


        document
            .getElementById(
                "btnLogout"
            )

            .addEventListener(

                "click",

                () => {

                    localStorage
                        .removeItem(
                            "token"
                        );

                    window.location.href =

                        "login.html";

                }

            );


        document
            .getElementById(
                "btnAtualizar"
            )

            .addEventListener(

                "click",

                () => {

                    carregarPerfil();

                    carregarImoveis();

                    mensagem(
                        "Dashboard atualizada"
                    );

                }

            );


        document
            .getElementById(
                "btnPdf"
            )

            .addEventListener(

                "click",

                async () => {

                    try {

                        const titulo =

                            document
                                .getElementById(
                                    "filtroTitulo"
                                )

                                .value;

                        const ordem =

                            document
                                .getElementById(
                                    "ordenacao"
                                )

                                .value;

                        let url =

                            `${API}/relatorios/imoveis/pdf?ordenarPor=${ordem}`;

                        if (titulo) {

                            url +=

                                `&titulo=${encodeURIComponent(titulo)}`;

                        }

                        const resposta =

                            await fetch(

                                url,

                                {

                                    headers: {

                                        Authorization:

                                            "Bearer " + token

                                    }

                                }

                            );

                        const blob =

                            await resposta.blob();

                        const pdf =

                            window.URL
                                .createObjectURL(
                                    blob
                                );

                        window.open(
                            pdf
                        );

                    } catch {

                        mensagem(
                            "Erro PDF",
                            "danger"
                        );

                    }

                }

            );


        carregarPerfil();

        carregarImoveis();

    </script>

</body>

</html>
