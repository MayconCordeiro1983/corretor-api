<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fb;
        }

        .page-title {
            font-weight: 700;
            color: #1f2d3d;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        .info-box {
            background: #f8fafc;
            border: 1px solid #e9eef5;
            border-radius: 14px;
            padding: 18px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0">Dashboard</h1>
        <button class="btn btn-outline-danger" id="btnLogout">Sair</button>
    </div>

    <div class="card mb-4">
        <div class="card-body p-4">
            <h3 class="mb-3">Bem-vindo ao sistema</h3>
            <p class="text-muted mb-4">Gerencie seus dados e seus imóveis em um só lugar.</p>

            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary" id="btnPerfil">Buscar meus dados</button>
                <button class="btn btn-success" onclick="window.location.href='imoveis.html'">Meus Imóveis</button>
            </div>

            <div id="mensagem" class="alert alert-info mt-4 mb-0">
                Usuário logado com sucesso.
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <h3 class="mb-3">Meus dados</h3>
            <div class="info-box">
                <pre id="resultado">Clique em "Buscar meus dados" para carregar as informações.</pre>
            </div>
        </div>
    </div>

</div>

<script>
const token = localStorage.getItem("token");
const mensagem = document.getElementById("mensagem");
const resultado = document.getElementById("resultado");

if (!token) {
    mensagem.className = "alert alert-warning mt-4 mb-0";
    mensagem.innerText = "Você não está logado. Redirecionando...";
    setTimeout(() => {
        window.location.href = "login.html";
    }, 1000);
}

document.getElementById("btnPerfil").addEventListener("click", async function() {
    try {
        const resposta = await fetch("https://corretor-api-1.onrender.com/usuarios/me", {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const texto = await resposta.text();

        if (!resposta.ok) {
            mensagem.className = "alert alert-danger mt-4 mb-0";
            mensagem.innerText = "Erro ao buscar dados.";
            resultado.innerText = "Erro: " + resposta.status + " - " + texto;
            return;
        }

        try {
            const dados = JSON.parse(texto);
            resultado.innerText = JSON.stringify(dados, null, 2);
        } catch {
            resultado.innerText = texto;
        }

        mensagem.className = "alert alert-success mt-4 mb-0";
        mensagem.innerText = "Dados carregados com sucesso.";

    } catch (erro) {
        mensagem.className = "alert alert-danger mt-4 mb-0";
        mensagem.innerText = "Erro ao conectar com a API.";
        resultado.innerText = "Erro ao buscar dados.";
        console.error(erro);
    }
});

document.getElementById("btnLogout").addEventListener("click", function() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
});
</script>
</body>
</html>
