<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard - Corretor Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
rel="stylesheet">

<style>

body{
background:#eef3f8;
min-height:100vh;
}

.card-dashboard{

border:none;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.header-card{

background:linear-gradient(
135deg,
#4f46e5,
#6366f1);

color:white;
border-radius:20px 20px 0 0;
padding:25px;

}

.info-card{

border:none;
border-radius:18px;
padding:20px;
box-shadow:0 3px 12px rgba(0,0,0,.08);

}

.total{

font-size:32px;
font-weight:bold;
color:#4f46e5;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand">

🏢 Corretor Pro

</span>

<button
id="btnLogout"
class="btn btn-danger">

<i class="bi bi-box-arrow-right"></i>
Sair

</button>

</div>

</nav>


<div class="container py-5">

<div class="card card-dashboard">

<div class="header-card">

<h2>

<i class="bi bi-speedometer2"></i>

Dashboard

</h2>

<p>

Painel principal do sistema

</p>

</div>

<div class="card-body p-4">

<div
id="mensagem"
class="alert d-none">
</div>


<div class="row g-4">

<div class="col-md-4">

<div class="info-card">

<h6>

Usuário

</h6>

<h4
id="nomeUsuario">

---

</h4>

</div>

</div>

<div class="col-md-4">

<div class="info-card">

<h6>

E-mail

</h6>

<h5
id="emailUsuario">

---

</h5>

</div>

</div>

<div class="col-md-4">

<div class="info-card">

<h6>

Total imóveis

</h6>

<div
id="totalImoveis"
class="total">

0

</div>

</div>

</div>

</div>


<hr class="my-4">


<div class="d-flex flex-wrap gap-3">

<a
href="imoveis.html"
class="btn btn-primary btn-lg">

<i class="bi bi-house-door"></i>

Gerenciar imóveis

</a>


<button
id="btnAtualizar"
class="btn btn-success btn-lg">

<i class="bi bi-arrow-clockwise"></i>

Atualizar

</button>


<button
id="btnPdf"
class="btn btn-danger btn-lg">

<i class="bi bi-file-earmark-pdf"></i>

Relatório PDF

</button>

</div>

</div>

</div>

</div>


<script src="js/api.js"></script>

<script>

const token=obterToken();

if(!token){

window.location.href="login.html";

}

const API=API_URL;


const nomeUsuario=
document.getElementById("nomeUsuario");

const emailUsuario=
document.getElementById("emailUsuario");

const totalImoveis=
document.getElementById("totalImoveis");


function mostrarMensagem(
texto,
tipo="success"
){

const mensagem=
document.getElementById("mensagem");

mensagem.className=
`alert alert-${tipo}`;

mensagem.innerText=
texto;

mensagem.classList.remove("d-none");

}


async function carregarPerfil(){

try{

const resposta=
await fetch(
`${API}/usuarios/me`,
{

headers:{
Authorization:
"Bearer "+token
}

});

if(
resposta.status===401
||
resposta.status===403
){

removerToken();

window.location.href=
"login.html";

return;

}

const dados=
await resposta.json();

nomeUsuario.innerText=
dados.nome;

emailUsuario.innerText=
dados.email;

}
catch{

mostrarMensagem(
"Erro carregar perfil",
"danger"
);

}

}



async function carregarImoveis(){

try{

const resposta=
await fetch(
`${API}/imoveis/meus`,
{

headers:{
Authorization:
"Bearer "+token
}

});

const dados=
await resposta.json();

totalImoveis.innerText=
dados.length;

}
catch{

mostrarMensagem(
"Erro imóveis",
"danger"
);

}

}


document
.getElementById(
"btnAtualizar"
)
.addEventListener(
"click",
()=>{

carregarPerfil();

carregarImoveis();

mostrarMensagem(
"Dashboard atualizada"
);

}
);


document
.getElementById(
"btnPdf"
)
.addEventListener(
"click",
()=>{

window.open(

`${API}/relatorios/imoveis/pdf`,
"_blank"

);

}
);


document
.getElementById(
"btnLogout"
)
.addEventListener(
"click",
()=>{

removerToken();

window.location.href=
"login.html";

}
);


carregarPerfil();

carregarImoveis();

</script>

</body>

</html>
