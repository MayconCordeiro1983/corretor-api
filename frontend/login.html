<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #dfe7f3);
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
        }

        .brand-title {
            font-weight: 700;
            color: #1f2d3d;
        }

        .subtitle {
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card login-card p-4">
    <div class="card-body">
        <h2 class="brand-title text-center mb-2">Corretor App</h2>
        <p class="subtitle text-center mb-4">Faça login para acessar seu painel</p>

        <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail">
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
        </div>

        <button class="btn btn-primary w-100" id="btnLogin">Entrar</button>

        <div id="mensagem" class="alert mt-3 d-none" role="alert"></div>

        <p class="text-center mt-4 mb-0">
            Não tem conta?
            <a href="cadastro.html" class="text-decoration-none">Cadastre-se</a>
        </p>
    </div>
</div>

<script>
const mensagem = document.getElementById("mensagem");

function mostrarMensagem(texto, tipo = "danger") {
    mensagem.className = `alert alert-${tipo} mt-3`;
    mensagem.classList.remove("d-none");
    mensagem.innerText = texto;
}

document.getElementById("btnLogin").addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();

    if (!email || !senha) {
        mostrarMensagem("Preencha e-mail e senha.", "warning");
        return;
    }

    try {
        const resposta = await fetch("https://corretor-api-1.onrender.com/usuarios/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, senha })
        });

        const texto = await resposta.text();

        if (!resposta.ok) {
            mostrarMensagem(texto || "Login inválido.", "danger");
            return;
        }

        let tokenSalvo = texto;

        try {
            const json = JSON.parse(texto);
            tokenSalvo = json.token ?? texto;
        } catch (e) {
            tokenSalvo = texto;
        }

        tokenSalvo = tokenSalvo.replace(/^"|"$/g, "").trim();

        localStorage.setItem("token", tokenSalvo);
        console.log("TOKEN SALVO:", tokenSalvo);

        mostrarMensagem("Login realizado com sucesso!", "success");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 800);

    } catch (e) {
        console.error(e);
        mostrarMensagem("Erro ao conectar com a API.", "danger");
    }
});
</script>

</body>
</html>
