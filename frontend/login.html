<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Corretor Pro | Login</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="card p-4 shadow" style="width:350px;">
        <h3 class="text-center mb-3">Login</h3>

        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="senha" class="form-control mb-3" placeholder="Senha">

        <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

        <div id="msg" class="mt-3 text-danger text-center"></div>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const res = await fetch("https://corretor-api-1.onrender.com/usuarios/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email, senha})
    });

    if (!res.ok) {
        document.getElementById("msg").innerText = "Login inválido";
        return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.token);

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
