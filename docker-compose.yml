services:
  postgres:
    image: postgres:17
    container_name: corretor-postgres
    environment:
      POSTGRES_DB: corretor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - corretor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d corretor_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: corretor-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/corretor_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: 1.2345678901234567e+49
      JWT_EXPIRATION_MS: 86400000

volumes:
  corretor_postgres_data:
